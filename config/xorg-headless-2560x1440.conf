# OPAI Server — Headless virtual display config
# Resolution: 2560x1440 (no physical monitor required)
# Updated: 2026-02-28
# Approach: ConnectedMonitor + MetaModes + ModeValidation (no CustomEDID)
#
# Recovery (SSH in): sudo rm /etc/X11/xorg.conf && sudo systemctl restart gdm
# Apply: sudo cp config/xorg-headless-2560x1440.conf /etc/X11/xorg.conf && sudo systemctl restart gdm

Section "Device"
    Identifier     "GPU0"
    Driver         "nvidia"
    VendorName     "NVIDIA Corporation"
    BoardName      "GeForce GTX 980"
    Option         "ConnectedMonitor" "DFP-0"
    Option         "AllowEmptyInitialConfiguration" "true"
    Option         "ModeValidation" "NoDFPNativeResolutionCheck,NoVirtualSizeCheck,NoMaxPClkCheck,NoEdidMaxPClkCheck,AllowNon60HzDFPModes"
EndSection

Section "Screen"
    Identifier     "Screen0"
    Device         "GPU0"
    Monitor        "Monitor0"
    DefaultDepth    24
    Option         "MetaModes" "DFP-0: 2560x1440 +0+0"
    Option         "DPI" "96 x 96"
    SubSection     "Display"
        Depth       24
        Modes      "2560x1440"
    EndSubSection
EndSection

Section "Monitor"
    Identifier     "Monitor0"
    VendorName     "Virtual"
    ModelName      "Virtual Display"
    HorizSync       28.0-100.0
    VertRefresh     48.0-75.0
    Option         "DPMS" "false"
EndSection
