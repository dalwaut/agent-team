<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPAI — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-3d">OP</div>
            </div>
            <h1 class="login-title">OPAI</h1>
            <p class="login-subtitle">Orchestrated Projects + Agent Intelligence</p>

            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email"
                           placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="pw-wrapper">
                        <input type="password" id="password" name="password" required
                               autocomplete="current-password" placeholder="Password">
                        <button type="button" class="pw-toggle" data-target="password" aria-label="Toggle password visibility">
                            <svg class="eye-open" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                            <svg class="eye-closed" style="display:none" viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                        </button>
                    </div>
                </div>

                <div id="error-message" class="error-message hidden"></div>

                <button type="submit" id="login-btn" class="login-btn">
                    <span id="login-text">Sign In</span>
                    <span id="login-spinner" class="spinner hidden"></span>
                </button>
            </form>
        </div>
        <p class="login-footer">OPAI Agent System</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        let sb = null;

        async function initSupabase() {
            const resp = await fetch('/auth/config');
            const cfg = await resp.json();
            if (!cfg.supabase_url || !cfg.supabase_anon_key) {
                showError('Supabase not configured. Contact admin.');
                return;
            }
            sb = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);

            // Check if already logged in
            const { data: { session } } = await sb.auth.getSession();
            if (session) {
                redirectAfterLogin();
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.classList.remove('hidden');
        }

        function redirectAfterLogin() {
            const params = new URLSearchParams(window.location.search);
            const returnUrl = params.get('return') || '/dashboard';
            window.location.href = returnUrl;
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!sb) { showError('Auth not initialized'); return; }

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');

            btn.disabled = true;
            document.getElementById('login-text').textContent = 'Signing in...';
            document.getElementById('login-spinner').classList.remove('hidden');
            document.getElementById('error-message').classList.add('hidden');

            const { data, error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                showError(error.message);
                btn.disabled = false;
                document.getElementById('login-text').textContent = 'Sign In';
                document.getElementById('login-spinner').classList.add('hidden');
                return;
            }

            redirectAfterLogin();
        });

        initSupabase();

        // Password visibility toggle
        document.querySelectorAll('.pw-toggle').forEach(btn => {
            btn.addEventListener('click', () => {
                const input = document.getElementById(btn.dataset.target);
                const isHidden = input.type === 'password';
                input.type = isHidden ? 'text' : 'password';
                btn.querySelector('.eye-open').style.display = isHidden ? 'none' : '';
                btn.querySelector('.eye-closed').style.display = isHidden ? '' : 'none';
            });
        });
    </script>
</body>
</html>
