<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%"   stop-color="#0e1428"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>

    <!--
      Arm fill: radial from center so arm is brightest where it
      passes close to the nucleus and fades at the outer extremity.
    -->
    <radialGradient id="armFill" cx="50" cy="50" r="42" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#93c5fd" stop-opacity="1"/>
      <stop offset="28%"  stop-color="#3b82f6" stop-opacity="0.9"/>
      <stop offset="62%"  stop-color="#1d4ed8" stop-opacity="0.55"/>
      <stop offset="88%"  stop-color="#1e3a8a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0f172a"  stop-opacity="0"/>
    </radialGradient>

    <!-- Outer ring arc gradient -->
    <linearGradient id="arcGrad" x1="11" y1="50" x2="89" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#38bdf8"/>
      <stop offset="50%"  stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <!-- Core nucleus -->
    <radialGradient id="nucleus" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="30%"  stop-color="#ddd6fe"/>
      <stop offset="70%"  stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>

    <!-- THREE blur layers create the nebula/cloud arm texture -->
    <!-- 1. Wide bloom: the diffuse haze around the arm -->
    <filter id="bloom" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <!-- 2. Medium glow: the bright body of the arm -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <!-- 3. Crisp core: the dense spine of the arm -->
    <filter id="spine" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1"/>
    </filter>

    <filter id="arcGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="dotGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="1.7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="coreGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!--
    ═══ GALAXY SPIRAL ARMS ═══
    3 filled crescent shapes.  Each arm = outer spiral edge (r≈38) + inner
    spiral edge (r≈30), forming a tapered band that sweeps ~180° CW.
    Arms spaced 120° apart (rotated via rotation matrix).

    ARM 1 — tip at (62,50) on the right [0°, r=12 from center]
    Outer edge sweeps CW: right→bottom→left, ending at (10,50) [r≈40]
    Inner edge returns CCW: left→top-ish→right tip

    ARM 1 path:
      M  62, 50                        ← tip (inner end)
      C  62, 66   56, 78   50, 78      ← outer edge, first quarter (sweeps down)
      C  38, 79   10, 66   10, 50      ← outer edge, second quarter (sweeps left)
      C  10, 38   24, 26   40, 25      ← inner edge return (sweeps up — tighter radius)
      C  52, 24   60, 36   62, 50  Z   ← inner edge back to tip

    ARM 2 = ARM 1 rotated 120° CW around (50,50)
    ARM 3 = ARM 1 rotated 240° CW around (50,50)

    Rotation 120° CW (SVG y-down):  cos=−0.5, sin=0.866
      x' = 50 + (px−50)·(−0.5) − (py−50)·(0.866)
      y' = 50 + (px−50)·(0.866) + (py−50)·(−0.5)

    ARM 2 computed:
      (62,50)→(44,60)  (62,66)→(30,52)  (56,78)→(23,41)  (50,78)→(26,36)
      (38,79)→(31,25)  (10,66)→(56,7)   (10,50)→(69,17)
      (10,38)→(80,21)  (24,26)→(84,40)  (40,25)→(77,54)
      (52,24)→(72,65)  (60,36)→(57,66)

    ARM 3 (240° CW):  cos=−0.5, sin=−0.866
      x' = 50 − 0.5(px−50) + 0.866(py−50)
      y' = 50 − 0.866(px−50) − 0.5(py−50)

      (62,50)→(44,40)  (62,66)→(58,32)  (56,78)→(71,31)  (50,78)→(74,36)
      (38,79)→(81,46)  (10,66)→(84,77)  (10,50)→(70,85)
      (10,38)→(60,91)  (24,26)→(42,85)  (40,25)→(33,71)
      (52,24)→(27,61)  (60,36)→(33,48)
  -->

  <!-- ── Layer 1: Wide diffuse nebula bloom ── -->
  <g opacity="0.42" filter="url(#bloom)">
    <path fill="url(#armFill)"
      d="M 62,50 C 62,66 56,78 50,78 C 38,79 10,66 10,50
         C 10,38 24,26 40,25 C 52,24 60,36 62,50 Z"/>
    <path fill="url(#armFill)"
      d="M 44,60 C 30,52 23,41 26,36 C 31,25 56,7 69,17
         C 80,21 84,40 77,54 C 72,65 57,66 44,60 Z"/>
    <path fill="url(#armFill)"
      d="M 44,40 C 58,32 71,31 74,36 C 81,46 84,77 70,85
         C 60,91 42,85 33,71 C 27,61 33,48 44,40 Z"/>
  </g>

  <!-- ── Layer 2: Bright arm body ── -->
  <g opacity="0.72" filter="url(#glow)">
    <path fill="url(#armFill)"
      d="M 62,50 C 62,66 56,78 50,78 C 38,79 10,66 10,50
         C 10,38 24,26 40,25 C 52,24 60,36 62,50 Z"/>
    <path fill="url(#armFill)"
      d="M 44,60 C 30,52 23,41 26,36 C 31,25 56,7 69,17
         C 80,21 84,40 77,54 C 72,65 57,66 44,60 Z"/>
    <path fill="url(#armFill)"
      d="M 44,40 C 58,32 71,31 74,36 C 81,46 84,77 70,85
         C 60,91 42,85 33,71 C 27,61 33,48 44,40 Z"/>
  </g>

  <!-- ── Layer 3: Dense arm spine ── -->
  <g opacity="0.88" filter="url(#spine)">
    <path fill="url(#armFill)"
      d="M 62,50 C 62,66 56,78 50,78 C 38,79 10,66 10,50
         C 10,38 24,26 40,25 C 52,24 60,36 62,50 Z"/>
    <path fill="url(#armFill)"
      d="M 44,60 C 30,52 23,41 26,36 C 31,25 56,7 69,17
         C 80,21 84,40 77,54 C 72,65 57,66 44,60 Z"/>
    <path fill="url(#armFill)"
      d="M 44,40 C 58,32 71,31 74,36 C 81,46 84,77 70,85
         C 60,91 42,85 33,71 C 27,61 33,48 44,40 Z"/>
  </g>

  <!-- ═══ OUTER SEGMENTED ARC RING (r=39) ═══ -->
  <g filter="url(#arcGlow)" stroke="url(#arcGrad)" stroke-width="2.8"
     fill="none" stroke-linecap="round">
    <path d="M 88.90,52.72 A 39,39 0 0,1 79.44,75.59"/>
    <path d="M 75.59,79.44 A 39,39 0 0,1 52.72,88.90"/>
    <path d="M 47.28,88.90 A 39,39 0 0,1 24.41,79.44"/>
    <path d="M 20.56,75.59 A 39,39 0 0,1 11.10,52.72"/>
    <path d="M 11.10,47.28 A 39,39 0 0,1 20.56,24.41"/>
    <path d="M 24.41,20.56 A 39,39 0 0,1 47.28,11.10"/>
    <path d="M 52.72,11.10 A 39,39 0 0,1 75.59,20.56"/>
    <path d="M 79.44,24.41 A 39,39 0 0,1 88.90,47.28"/>
  </g>

  <!-- Node dots -->
  <g filter="url(#dotGlow)">
    <circle cx="89"   cy="50"   r="2.5" fill="white"/>
    <circle cx="50"   cy="89"   r="2.5" fill="white"/>
    <circle cx="11"   cy="50"   r="2.5" fill="white"/>
    <circle cx="50"   cy="11"   r="2.5" fill="white"/>
    <circle cx="77.6" cy="77.6" r="2.0" fill="#67e8f9"/>
    <circle cx="22.4" cy="77.6" r="2.0" fill="#67e8f9"/>
    <circle cx="22.4" cy="22.4" r="2.0" fill="#67e8f9"/>
    <circle cx="77.6" cy="22.4" r="2.0" fill="#67e8f9"/>
  </g>

  <!-- Central nucleus -->
  <g filter="url(#coreGlow)">
    <circle cx="50" cy="50" r="11" fill="url(#nucleus)"/>
  </g>
  <polygon points="56,50 53,55.2 47,55.2 44,50 47,44.8 53,44.8"
           fill="#1e1b4b" stroke="#818cf8" stroke-width="1.1"/>
  <circle cx="50" cy="50" r="2.8" fill="#c4b5fd"/>
  <circle cx="50" cy="50" r="1.2" fill="white"/>
</svg>
