<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPAI Messenger</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/style.css">
    <script src="/auth/static/js/navbar.js" defer></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar -->
        <div id="sidebar">
            <div class="sidebar-header">
                <h1>Messenger</h1>
                <div class="sidebar-actions">
                    <button class="btn-icon" id="btn-new-dm" title="New message">+</button>
                    <button class="btn-icon" id="btn-new-group" title="New group">G</button>
                    <button class="btn-icon" id="btn-search" title="Search messages">S</button>
                </div>
            </div>
            <div class="sidebar-search">
                <input type="text" id="channel-filter" placeholder="Filter conversations...">
            </div>
            <div id="channel-list"></div>
            <div class="sidebar-footer">
                <div class="user-avatar" id="my-avatar"></div>
                <span class="user-name" id="my-name"></span>
                <span class="user-status" id="my-status">Online</span>
            </div>
        </div>

        <!-- Chat Area -->
        <div id="chat-area" style="position:relative;">
            <div id="empty-state">
                <div class="empty-icon">💬</div>
                <p>Select a conversation or start a new one</p>
            </div>

            <div id="chat-header" style="display:none;">
                <div class="chat-avatar" id="chat-avatar"></div>
                <div class="chat-info">
                    <div class="chat-name" id="chat-name"></div>
                    <div class="chat-status" id="chat-status"></div>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" id="btn-chat-search" title="Search">S</button>
                </div>
            </div>

            <div id="messages" style="display:none;"></div>
            <div id="typing-indicator" style="display:none;"></div>

            <div id="input-area" style="display:none;">
                <div id="reply-bar">
                    <span class="reply-text" id="reply-text"></span>
                    <span class="reply-close" id="reply-close">&times;</span>
                </div>
                <div class="input-row">
                    <button class="btn-icon" id="btn-upload" title="Upload file">📎</button>
                    <textarea id="message-input" placeholder="Type a message..." rows="1"></textarea>
                    <button class="btn-icon" id="btn-emoji" title="Emoji" style="position:relative;">😀
                        <div class="emoji-picker" id="emoji-picker"></div>
                    </button>
                    <button class="btn-send" id="btn-send" title="Send">➤</button>
                </div>
                <input type="file" id="file-input" hidden>
            </div>

            <!-- Search panel -->
            <div id="search-panel">
                <div class="search-header">
                    <input type="text" id="search-input" placeholder="Search messages...">
                    <button class="btn-icon" id="btn-close-search">&times;</button>
                </div>
                <div class="search-results" id="search-results"></div>
            </div>
        </div>
    </div>

    <!-- New DM Modal -->
    <div class="modal-overlay" id="dm-modal">
        <div class="modal">
            <h2>New Message</h2>
            <input class="modal-input" id="dm-user-search" placeholder="Search users...">
            <div class="modal-user-list" id="dm-user-list"></div>
            <div class="modal-buttons">
                <button class="btn-modal" onclick="closeModal('dm-modal')">Cancel</button>
                <button class="btn-modal primary" id="btn-start-dm">Start Chat</button>
            </div>
        </div>
    </div>

    <!-- New Group Modal -->
    <div class="modal-overlay" id="group-modal">
        <div class="modal">
            <h2>New Group</h2>
            <input class="modal-input" id="group-name-input" placeholder="Group name">
            <input class="modal-input" id="group-user-search" placeholder="Search users...">
            <div class="modal-user-list" id="group-user-list"></div>
            <div class="modal-buttons">
                <button class="btn-modal" onclick="closeModal('group-modal')">Cancel</button>
                <button class="btn-modal primary" id="btn-create-group">Create Group</button>
            </div>
        </div>
    </div>

    <!-- Drop zone overlay -->
    <div class="drop-zone-overlay" id="drop-zone">
        <p>Drop files here to upload</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="static/js/app.js"></script>
    <script src="static/js/channels.js"></script>
    <script src="static/js/chat.js"></script>
    <script src="static/js/presence.js"></script>
    <script src="static/js/reactions.js"></script>
    <script src="static/js/upload.js"></script>
    <script src="static/js/search.js"></script>
</body>
</html>
