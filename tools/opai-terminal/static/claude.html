<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPAI — Claude Code</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-web-links@0.11.0/lib/addon-web-links.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a0f;
            --border: #2a2a3e;
            --text: #e0e0e8;
            --text-muted: #8888a0;
            --accent: #a855f7;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .term-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 1rem;
            background: #12121a;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .term-header h1 {
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .term-header .badge {
            font-size: 0.6rem;
            background: var(--accent);
            color: #fff;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
        }
        .term-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #ef4444;
        }
        .status-dot.connected { background: #10b981; }
        #terminal-container {
            flex: 1;
            padding: 4px;
            overflow: hidden;
        }
        .auth-message {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
    <script src="/auth/static/js/navbar.js" defer></script>
</head>
<body>
    <div class="term-header">
        <h1>
            OPAI <span class="badge">Claude Code</span>
        </h1>
        <div class="term-status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Authenticating...</span>
        </div>
    </div>
    <div id="terminal-container">
        <div id="auth-msg" class="auth-message">Authenticating...</div>
    </div>

    <script>
        let term = null;
        let ws = null;
        let fitAddon = null;

        async function getAuthToken() {
            try {
                const resp = await fetch('/auth/config');
                const cfg = await resp.json();
                if (!cfg.supabase_url || !cfg.supabase_anon_key) return null;

                const sb = window.supabase.createClient(cfg.supabase_url, cfg.supabase_anon_key);

                // Try getSession first, then refreshSession as fallback
                let { data: { session } } = await sb.auth.getSession();
                if (!session) {
                    const { data } = await sb.auth.refreshSession();
                    session = data.session;
                }
                if (!session) {
                    window.location.href = '/auth/login?return=/claude';
                    return null;
                }
                // Check app access (non-admins only)
                if (session.user.app_metadata?.role !== 'admin') {
                    try {
                        const ar = await fetch('/api/me/apps', { headers: { 'Authorization': `Bearer ${session.access_token}` } });
                        if (ar.ok) {
                            const ad = await ar.json();
                            if (!(ad.allowed_apps || []).includes('claude')) { window.location.href = '/'; return null; }
                        }
                    } catch (e) { /* allow on failure */ }
                }
                return session.access_token;
            } catch (e) {
                console.error('Auth error:', e);
                return null;
            }
        }

        function setStatus(connected, text) {
            document.getElementById('status-dot').className = 'status-dot' + (connected ? ' connected' : '');
            document.getElementById('status-text').textContent = text;
        }

        async function initTerminal() {
            const token = await getAuthToken();
            if (!token) {
                document.getElementById('auth-msg').textContent = 'Authentication failed. Redirecting...';
                return;
            }

            document.getElementById('auth-msg').remove();

            term = new window.Terminal({
                cursorBlink: true,
                fontSize: 14,
                fontFamily: "'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace",
                theme: {
                    background: '#0a0a0f',
                    foreground: '#e0e0e8',
                    cursor: '#a855f7',
                    selectionBackground: 'rgba(168, 85, 247, 0.3)',
                },
                scrollback: 10000,
            });

            fitAddon = new window.FitAddon.FitAddon();
            term.loadAddon(fitAddon);
            term.loadAddon(new window.WebLinksAddon.WebLinksAddon());

            term.open(document.getElementById('terminal-container'));
            fitAddon.fit();

            // Connect WebSocket to /ws/claude
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws/claude`);

            ws.onopen = () => {
                ws.send(JSON.stringify({ type: 'auth', token }));
                setTimeout(() => {
                    ws.send(JSON.stringify({
                        type: 'resize',
                        cols: term.cols,
                        rows: term.rows,
                    }));
                }, 100);
            };

            ws.onmessage = (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'connected') {
                        setStatus(true, 'Connected');
                        return;
                    }
                    if (msg.type === 'system') {
                        term.write(msg.message);
                        return;
                    }
                    if (msg.type === 'pong') return;
                } catch (e) {}
                term.write(event.data);
            };

            ws.onclose = (event) => {
                setStatus(false, `Disconnected (${event.reason || event.code})`);
                term.write('\r\n\x1b[31m[Connection closed]\x1b[0m\r\n');
            };

            ws.onerror = () => {
                setStatus(false, 'Connection error');
            };

            term.onData((data) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(data);
                }
            });

            window.addEventListener('resize', () => {
                if (fitAddon) fitAddon.fit();
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'resize',
                        cols: term.cols,
                        rows: term.rows,
                    }));
                }
            });

            setInterval(() => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({ type: 'ping' }));
                }
            }, 30000);
        }

        initTerminal();
    </script>
    <script src="/messenger/static/js/widget.js" defer></script>
</body>
</html>
