<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELM — Handsfree Enterprise Launch Machine</title>
    <link rel="stylesheet" href="/helm/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/auth/static/js/navbar.js" defer></script>
</head>
<body>

<!-- Loading Overlay -->
<div id="loading-overlay" class="loading-overlay">
    <div class="loading-content">
        <div class="loading-icon">HELM</div>
        <div class="loading-sub">Handsfree Enterprise Launch Machine</div>
        <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
</div>

<!-- App Shell -->
<div id="app" class="app hidden">

    <!-- Top Bar -->
    <header class="top-bar">
        <div class="top-bar-left">
            <a href="/helm/" class="top-bar-logo">HELM</a>
        </div>
        <div class="top-bar-center" id="business-selector-area">
            <!-- Business selector rendered by JS -->
        </div>
        <div class="top-bar-right">
            <span class="user-display" id="user-display"></span>
        </div>
    </header>

    <!-- Business Header (shown when a business is loaded) -->
    <div id="business-header" class="business-header hidden"></div>

    <!-- Tab Navigation (shown after a business is loaded) -->
    <nav class="tab-nav hidden" id="tab-nav">
        <button class="tab-btn active" data-tab="dashboard" onclick="showTab('dashboard')">Dashboard</button>
        <button class="tab-btn" data-tab="onboarding" onclick="showTab('onboarding')">Onboarding</button>
        <button class="tab-btn" data-tab="actions" onclick="showTab('actions')">Actions</button>
        <button class="tab-btn" data-tab="hitl" onclick="showTab('hitl')">
            HITL
            <span class="tab-badge" id="hitl-badge" style="display:none;"></span>
        </button>
        <button class="tab-btn" data-tab="settings" onclick="showTab('settings')">Settings</button>
    </nav>

    <!-- View Panels -->
    <div id="view-container" class="view-container">
        <div class="view active" data-tab="welcome" id="view-welcome"></div>
        <div class="view" data-tab="dashboard" id="view-dashboard"></div>
        <div class="view" data-tab="onboarding" id="view-onboarding"></div>
        <div class="view" data-tab="actions" id="view-actions"></div>
        <div class="view" data-tab="hitl" id="view-hitl"></div>
        <div class="view" data-tab="settings" id="view-settings"></div>
    </div>

</div>

<!-- Toast Container -->
<div id="toast-container" class="toast-container"></div>

<!-- Scripts (order matters) -->
<script src="/helm/static/js/app.js?v=29"></script>
<script src="/helm/static/js/onboarding.js?v=28"></script>
<script src="/helm/static/js/website-builder.js?v=28"></script>
<script src="/helm/static/js/dashboard.js?v=27"></script>

</body>
</html>
