<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3fb950"/>
      <stop offset="100%" style="stop-color:#58a6ff"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)" stroke="#30363d" stroke-width="2"/>
  <!-- Monitor frame -->
  <rect x="40" y="44" width="176" height="120" rx="8" fill="none" stroke="url(#glow)" stroke-width="4"/>
  <!-- Screen content - signal bars -->
  <rect x="64" y="124" width="16" height="20" rx="2" fill="#3fb950" opacity="0.9"/>
  <rect x="88" y="112" width="16" height="32" rx="2" fill="#3fb950" opacity="0.9"/>
  <rect x="112" y="96" width="16" height="48" rx="2" fill="#58a6ff" opacity="0.9"/>
  <rect x="136" y="80" width="16" height="64" rx="2" fill="#58a6ff" opacity="0.9"/>
  <rect x="160" y="64" width="16" height="80" rx="2" fill="#bc8cff" opacity="0.9"/>
  <!-- Stand -->
  <rect x="108" y="168" width="40" height="8" rx="2" fill="#30363d"/>
  <rect x="88" y="178" width="80" height="6" rx="3" fill="#30363d"/>
  <!-- Pulse dot -->
  <circle cx="196" cy="60" r="6" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Text -->
  <text x="128" y="220" text-anchor="middle" font-family="monospace" font-size="24" font-weight="bold" fill="#e6edf3">OPAI</text>
  <text x="128" y="242" text-anchor="middle" font-family="monospace" font-size="14" fill="#8b949e">monitor</text>
</svg>
