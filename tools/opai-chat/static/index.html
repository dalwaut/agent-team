<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPAI Chat</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Syntax Highlighting -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Supabase Auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="static/style.css">
    <script src="/auth/static/js/navbar.js" defer></script>
    <script src="/docs/static/js/docs-widget.js" defer></script>
</head>

<body>
    <div id="app">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-inner">
                <!-- Sidebar Header -->
                <div class="sidebar-header">
                    <button id="new-chat-btn" class="new-chat-btn" title="New chat">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        <span class="sidebar-label">New chat</span>
                    </button>
                </div>

                <!-- Conversation List -->
                <div id="conversation-list" class="conversation-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </aside>

        <!-- Sidebar Overlay (mobile) -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>

        <!-- Main Area -->
        <div id="main-area" class="main-area">
            <!-- Top Bar -->
            <div id="topbar" class="topbar">
                <div class="topbar-left">
                    <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle sidebar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="6" x2="21" y2="6"/>
                            <line x1="3" y1="12" x2="21" y2="12"/>
                            <line x1="3" y1="18" x2="21" y2="18"/>
                        </svg>
                    </button>
                    <span id="topbar-title" class="topbar-title">OPAI Chat</span>
                </div>
                <div class="topbar-right">
                    <button id="exit-mozart-btn" class="exit-mozart-btn hidden" title="Exit Mozart Mode">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                        Exit Mozart
                    </button>
                </div>
            </div>

            <!-- Chat Container -->
            <div id="chat-container" class="chat-container">
                <!-- Welcome View (centered input like Grok/Claude) -->
                <div id="welcome-view" class="welcome-view">
                    <div class="welcome-content">
                        <div class="welcome-logo">
                            <div class="logo-mark">
                                <span>OP</span>
                            </div>
                        </div>
                        <h1 class="welcome-heading">What can I help you with?</h1>

                        <!-- Centered Input -->
                        <div class="welcome-input-wrapper">
                            <div class="input-box" id="welcome-input-box">
                                <div class="input-box-top">
                                    <textarea id="welcome-message-input" class="message-input" placeholder="Ask anything..." rows="1"></textarea>
                                </div>
                                <div class="input-box-bottom">
                                    <div class="input-box-left">
                                        <button id="welcome-model-btn" class="model-pill" title="Select model">
                                            <span class="model-pill-dot"></span>
                                            <span class="model-pill-label">Haiku</span>
                                            <svg class="model-pill-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                                        </button>
                                        <div id="welcome-model-dropdown" class="model-dropdown hidden">
                                            <!-- Populated by JS -->
                                        </div>
                                        <button id="welcome-attach-btn" class="icon-btn" title="Attach file">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                                            </svg>
                                        </button>
                                    </div>
                                    <div class="input-box-right">
                                        <button id="welcome-mic-btn" class="icon-btn mic-btn" title="Voice input">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                                <line x1="12" y1="19" x2="12" y2="23"/>
                                                <line x1="8" y1="23" x2="16" y2="23"/>
                                            </svg>
                                        </button>
                                        <button id="welcome-send-btn" class="send-btn" title="Send message">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Prompt Suggestions -->
                        <div class="prompt-suggestions">
                            <button class="suggestion-chip" data-prompt="What's the status of OPAI services?">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                Service status
                            </button>
                            <button class="suggestion-chip" data-prompt="Help me write a Python script">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                                Write code
                            </button>
                            <button class="suggestion-chip" data-prompt="Explain how the OPAI orchestrator works">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                Explain OPAI
                            </button>
                            <button class="suggestion-chip" data-prompt="Summarize my recent conversations">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                Summarize chats
                            </button>
                        </div>

                        <!-- Mozart Entry -->
                        <div class="mozart-entry">
                            <button id="try-mozart-btn" class="try-mozart-btn" title="Try Mozart — OPAI's musical AI guide">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                                Try Mozart
                            </button>
                        </div>
                    </div>

                    <!-- Mozart Welcome Variant (hidden by default) -->
                    <div id="mozart-welcome" class="welcome-content mozart-welcome hidden">
                        <div class="welcome-logo">
                            <div class="logo-mark mozart-logo-mark">
                                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                            </div>
                        </div>
                        <h1 class="welcome-heading">What shall we compose together?</h1>
                        <p class="mozart-subtitle">Mozart — your musical guide to the OPAI orchestra</p>

                        <!-- Mozart Input (mirrors welcome input) -->
                        <div class="welcome-input-wrapper">
                            <div class="input-box" id="mozart-input-box">
                                <div class="input-box-top">
                                    <textarea id="mozart-message-input" class="message-input" placeholder="Ask Mozart anything..." rows="1"></textarea>
                                </div>
                                <div class="input-box-bottom">
                                    <div class="input-box-left">
                                        <button id="mozart-model-btn" class="model-pill" title="Select model">
                                            <span class="model-pill-dot"></span>
                                            <span class="model-pill-label">Haiku</span>
                                            <svg class="model-pill-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                                        </button>
                                        <div id="mozart-model-dropdown" class="model-dropdown hidden"></div>
                                        <button id="mozart-attach-btn" class="icon-btn" title="Attach file">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                                            </svg>
                                        </button>
                                    </div>
                                    <div class="input-box-right">
                                        <button id="mozart-mic-btn" class="icon-btn mic-btn" title="Voice input">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                                <line x1="12" y1="19" x2="12" y2="23"/>
                                                <line x1="8" y1="23" x2="16" y2="23"/>
                                            </svg>
                                        </button>
                                        <button id="mozart-send-btn" class="send-btn" title="Send message">
                                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="prompt-suggestions">
                            <button class="suggestion-chip" data-prompt="Introduce yourself, Mozart. What can you help me with?">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
                                Meet Mozart
                            </button>
                            <button class="suggestion-chip" data-prompt="Explain the OPAI orchestra — how do agents, squads, and the conductor work together?">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                                The Orchestra
                            </button>
                            <button class="suggestion-chip" data-prompt="What's the current state of the OPAI ensemble? Which services are performing?">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                Performance Status
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Chat View (messages + bottom input) -->
                <div id="chat-view" class="chat-view hidden">
                    <div id="messages-container" class="messages-container">
                        <!-- Messages populated by JS -->
                    </div>

                    <!-- Bottom Input -->
                    <div class="chat-input-wrapper">
                        <div class="input-box" id="chat-input-box">
                            <div class="input-box-top">
                                <textarea id="chat-message-input" class="message-input" placeholder="Reply..." rows="1"></textarea>
                            </div>
                            <div class="input-box-bottom">
                                <div class="input-box-left">
                                    <button id="chat-model-btn" class="model-pill" title="Select model">
                                        <span class="model-pill-dot"></span>
                                        <span class="model-pill-label">Haiku</span>
                                        <svg class="model-pill-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
                                    </button>
                                    <div id="chat-model-dropdown" class="model-dropdown model-dropdown-up hidden">
                                        <!-- Populated by JS -->
                                    </div>
                                    <button id="chat-attach-btn" class="icon-btn" title="Attach file">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                                        </svg>
                                    </button>
                                </div>
                                <div class="input-box-right">
                                    <button id="chat-mic-btn" class="icon-btn mic-btn" title="Voice input">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                                            <line x1="12" y1="19" x2="12" y2="23"/>
                                            <line x1="8" y1="23" x2="16" y2="23"/>
                                        </svg>
                                    </button>
                                    <button id="chat-send-btn" class="send-btn" title="Send message">
                                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Canvas Panel (slide in from right) -->
        <div id="canvas-panel" class="canvas-panel hidden">
            <div class="canvas-header">
                <div id="canvas-tabs" class="canvas-tabs"></div>
                <button id="canvas-close-btn" class="canvas-close-btn">&times;</button>
            </div>
            <div class="canvas-controls">
                <select id="canvas-language" class="canvas-language">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="html">HTML</option>
                    <option value="css">CSS</option>
                    <option value="json">JSON</option>
                    <option value="markdown">Markdown</option>
                </select>
                <div id="canvas-mode-toggle" class="canvas-mode-toggle hidden">
                    <button class="mode-btn active" data-mode="code">Code</button>
                    <button class="mode-btn" data-mode="preview">Preview</button>
                </div>
            </div>
            <div id="canvas-content" class="canvas-content">
                <div id="canvas-editor" class="canvas-editor">
                    <textarea id="canvas-textarea" class="canvas-textarea"></textarea>
                </div>
                <div id="canvas-preview" class="canvas-preview hidden">
                    <iframe id="preview-iframe" sandbox="allow-scripts"></iframe>
                </div>
            </div>
            <div class="canvas-actions">
                <button id="canvas-copy-btn" class="canvas-action-btn">Copy</button>
                <button id="canvas-save-btn" class="canvas-action-btn primary">Save</button>
                <button id="canvas-insert-btn" class="canvas-action-btn">Insert</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/auth/static/js/auth-v3.js"></script>
    <script src="static/js/app.js"></script>
    <script src="static/js/sidebar.js"></script>
    <script src="static/js/chat.js"></script>
    <script src="static/js/markdown.js"></script>
    <script src="static/js/tools.js"></script>
    <script src="static/js/voice.js"></script>
    <script src="static/js/canvas.js"></script>
    <script src="static/js/preview.js"></script>
    <script src="/messenger/static/js/widget.js" defer></script>
</body>

</html>
