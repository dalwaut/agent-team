<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPAI Forum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/forum/static/css/forum.css">
    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <!-- Syntax highlighting -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script>
    <!-- Supabase auth -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth/static/js/navbar.js" defer></script>
</head>
<body>
    <!-- Top nav bar -->
    <nav class="topnav">
        <div class="topnav-inner">
            <div class="topnav-left">
                <div class="topnav-logo">
                    <span class="logo-icon">📢</span>
                    <span class="logo-text">OPAI Forum</span>
                </div>
            </div>
            <div class="topnav-right">
                <button class="btn btn-accent btn-new-post" id="btn-new-post" onclick="window.location.hash='#/new'">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
                    New Post
                </button>
                <span class="user-chip" id="user-display"></span>
            </div>
        </div>
    </nav>

    <div class="forum-layout">
        <!-- Main content -->
        <main id="app">
            <div class="loading">
                <div class="spinner"></div>
                <span>Loading forum...</span>
            </div>
        </main>

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-section">
                <h3 class="sidebar-title">Topics</h3>
                <div id="sidebar-categories">
                    <div class="sidebar-loading">Loading...</div>
                </div>
            </div>
            <div class="sidebar-section">
                <h3 class="sidebar-title">About</h3>
                <p class="sidebar-about">Dev community for sharing projects, asking questions, and discussing ideas.</p>
                <div class="sidebar-stats" id="sidebar-stats"></div>
            </div>
        </aside>
    </div>

    <script src="/forum/static/js/forum.js"></script>
</body>
</html>
