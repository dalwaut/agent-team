<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Orchestra — OPAI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/orchestra/static/style.css?v=5">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="/auth/static/js/navbar.js" defer></script>
</head>
<body>

<!-- ── Loading Screen ──────────────────────────────────────────── -->
<div id="loading-screen">
    <div class="loading-content">
        <div class="loading-emblem">🎼</div>
        <div class="loading-title">Agent Orchestra</div>
        <div class="loading-sub">Tuning the ensemble…</div>
        <div class="loading-bar"><div class="loading-fill"></div></div>
    </div>
</div>

<!-- ── App Shell ──────────────────────────────────────────────── -->
<div id="app" class="hidden">

    <!-- Top Navigation -->
    <header class="orch-header">
        <div class="orch-header-left">
            <a href="/dashboard" class="orch-logo">
                <span class="orch-logo-emblem">🎼</span>
                <span class="orch-logo-name">Agent Orchestra</span>
            </a>
            <!-- Breadcrumb -->
            <nav class="orch-breadcrumb" id="breadcrumb">
                <span class="bc-item bc-active" data-nav="orchestra">Full Orchestra</span>
            </nav>
        </div>
        <div class="orch-header-center">
            <!-- Secondary nav panels -->
            <nav class="orch-panel-nav">
                <button class="panel-btn" data-panel="concert-hall" title="Run History">
                    🏛️ <span>Concert Hall</span>
                </button>
                <button class="panel-btn" data-panel="calendar" title="Scheduled Runs">
                    📅 <span>Calendar</span>
                </button>
                <button class="panel-btn" data-panel="symphony" title="Multi-squad Pipelines">
                    🎶 <span>Symphony</span>
                </button>
                <button class="panel-btn" data-panel="composition" title="Visual Flow Editor">
                    🖊️ <span>Composition</span>
                </button>
            </nav>
        </div>
        <div class="orch-header-right">
            <button class="icon-btn" id="new-musician-btn" title="Add new musician (agent)">＋ Musician</button>
            <button class="icon-btn secondary" id="new-programme-btn" title="Create a new programme (squad)">＋ Programme</button>
            <span class="user-badge" id="user-display"></span>
        </div>
    </header>

    <!-- Main Stage -->
    <main class="orch-stage" id="orch-stage">

        <!-- ── Orchestra Pit (Level 1) ─────────────────────────── -->
        <section class="orch-view active" id="view-orchestra">
            <div class="pit-shell">
                <div class="pit-controls">
                    <div class="pit-meta" id="pit-meta">
                        <span class="pit-counts" id="pit-counts"></span>
                    </div>
                    <div class="pit-run-controls">
                        <select class="orch-select" id="pit-programme-select">
                            <option value="">— Select a Programme —</option>
                        </select>
                        <button class="btn-ghost btn-sm" id="pit-view-flow-btn" disabled title="Open in Composition Studio">🖊️ View Flow</button>
                        <button class="perform-btn" id="pit-perform-btn" disabled>▶ Begin Performance</button>
                    </div>
                </div>
                <div class="pit-svg-wrap" id="pit-svg-wrap">
                    <svg id="orchestra-svg" viewBox="0 0 900 490" xmlns="http://www.w3.org/2000/svg"
                         preserveAspectRatio="xMidYMid meet">
                        <!-- Rendered by orchestra.js -->
                    </svg>
                    <div id="pit-tooltip" class="pit-tooltip hidden"></div>
                </div>
                <div class="pit-legend" id="pit-legend"></div>
            </div>
        </section>

        <!-- ── Section View (Level 2) ─────────────────────────── -->
        <section class="orch-view hidden" id="view-section">
            <div class="section-shell">
                <div class="section-header" id="section-header">
                    <!-- Rendered by section.js -->
                </div>
                <div class="section-body">
                    <div class="section-stages" id="section-stages">
                        <!-- Phase lanes rendered by section.js -->
                    </div>
                    <div class="section-pool-panel" id="section-pool-panel">
                        <div class="pool-header">
                            <h4>Available Musicians</h4>
                            <input class="pool-search" id="pool-search" placeholder="Search agents…" type="text">
                        </div>
                        <div class="pool-list" id="pool-list"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- ── Musician View (Level 3) ────────────────────────── -->
        <section class="orch-view hidden" id="view-musician">
            <div class="musician-shell" id="musician-shell">
                <!-- Rendered by musician.js -->
            </div>
        </section>

        <!-- ── Concert Hall (Runs) ────────────────────────────── -->
        <section class="orch-view hidden" id="view-concert-hall">
            <div class="panel-shell" id="concert-hall-shell">
                <!-- Rendered by concert-hall.js -->
            </div>
        </section>

        <!-- ── Concert Calendar (Scheduler) ──────────────────── -->
        <section class="orch-view hidden" id="view-calendar">
            <div class="panel-shell" id="calendar-shell">
                <!-- Rendered by calendar.js -->
            </div>
        </section>

        <!-- ── Symphony Movements (Workflows) ────────────────── -->
        <section class="orch-view hidden" id="view-symphony">
            <div class="panel-shell" id="symphony-shell">
                <!-- Rendered by symphony.js -->
            </div>
        </section>

        <!-- ── Composition Studio (Flow Editor) ──────────────── -->
        <section class="orch-view hidden composition-view" id="view-composition">
            <div class="composition-shell" id="composition-shell">
                <!-- Rendered by composition.js -->
            </div>
        </section>

    </main>
</div>

<!-- ── Global Tooltip ─────────────────────────────────────────── -->
<div id="orch-tooltip" class="orch-tooltip hidden" role="tooltip"></div>

<!-- ── Toast Container ───────────────────────────────────────── -->
<div id="toast-container" class="toast-container"></div>

<!-- ── Musician Modal (Create / Edit) ────────────────────────── -->
<div id="musician-modal" class="modal-overlay hidden">
    <div class="modal-box" id="musician-modal-box">
        <!-- Rendered by musician.js -->
    </div>
</div>

<!-- ── Programme Modal (Create Squad) ───────────────────────── -->
<div id="programme-modal" class="modal-overlay hidden">
    <div class="modal-box">
        <div class="modal-header">
            <h2>New Programme <span class="term-badge" title="Technical name: Squad">Squad</span></h2>
            <button class="modal-close" onclick="closeProgrammeModal()">✕</button>
        </div>
        <form id="programme-form" class="orch-form">
            <label>
                Programme ID <span class="term-badge" title="Technical name: Squad ID">Squad ID</span>
                <input type="text" id="prog-id" placeholder="e.g. nightly_audit" pattern="[a-z0-9_]+" required>
                <span class="field-hint">Lowercase letters, numbers, underscores only</span>
            </label>
            <label>
                Programme Name <span class="term-badge" title="Technical name: Description">Description</span>
                <input type="text" id="prog-desc" placeholder="e.g. Comprehensive nightly audit" required>
            </label>
            <div class="modal-actions">
                <button type="button" class="btn-ghost" onclick="closeProgrammeModal()">Cancel</button>
                <button type="submit" class="btn-gold">Create Programme</button>
            </div>
        </form>
    </div>
</div>

<!-- ── Confirm Modal ─────────────────────────────────────────── -->
<div id="confirm-modal" class="modal-overlay hidden">
    <div class="modal-box modal-box-sm">
        <div class="modal-header">
            <h2 id="confirm-title">Confirm</h2>
        </div>
        <p id="confirm-msg" class="modal-body-text"></p>
        <div class="modal-actions">
            <button class="btn-ghost" onclick="confirmResolve(false)">Cancel</button>
            <button class="btn-danger" id="confirm-ok-btn" onclick="confirmResolve(true)">Confirm</button>
        </div>
    </div>
</div>

<!-- ── Scripts ───────────────────────────────────────────────── -->
<script src="/orchestra/static/js/app.js?v=5"></script>
<script src="/orchestra/static/js/orchestra.js?v=5"></script>
<script src="/orchestra/static/js/section.js?v=5"></script>
<script src="/orchestra/static/js/musician.js?v=5"></script>
<script src="/orchestra/static/js/concert-hall.js?v=5"></script>
<script src="/orchestra/static/js/calendar.js?v=5"></script>
<script src="/orchestra/static/js/symphony.js?v=5"></script>
<script src="/orchestra/static/js/composition.js?v=5"></script>

</body>
</html>
