<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPAI Docs</title>
    <link rel="icon" type="image/png" href="/static/opai-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/docs/static/style.css">
</head>
<body>

    <!-- Top Bar -->
    <div class="topbar">
        <button class="mobile-toggle" id="mobile-toggle" aria-label="Toggle sidebar">&#9776;</button>
        <a href="/docs/" class="topbar-brand">
            <span>OPAI</span> Docs
        </a>
        <div class="search-wrapper">
            <span class="search-icon">&#128269;</span>
            <input type="search" class="search-input" id="search-input"
                   placeholder="Search all wiki docs..." autocomplete="off">
            <span class="search-kbd">Ctrl+K</span>
            <div class="search-results" id="search-results"></div>
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- Main content -->
    <div class="main" id="main">
        <div class="welcome" id="welcome">
            <h1>OPAI Documentation</h1>
            <p>Browse the system wiki. Select a doc from the sidebar or search above.</p>
            <div class="welcome-stats" id="welcome-stats"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/auth/static/js/auth-v3.js"></script>
    <script src="/auth/static/js/navbar.js"></script>
    <script src="/docs/static/app.js"></script>
</body>
</html>
