  <rect x="168" y="212" width="8" height="6" fill="#a78bfa"/>
  <rect x="180" y="212" width="6" height="6" fill="#a78bfa"/>
  <rect x="190" y="212" width="8" height="6" fill="#a78bfa"/>
  <rect x="202" y="212" width="8" height="6" fill="#a78bfa"/>
